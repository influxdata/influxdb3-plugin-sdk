version: 2.1

parameters:
  run_nightly:
    type: boolean
    default: false
    description: |
      When true, runs the `nightly` workflow on this pipeline (full
      cargo-mutants sweep + coverage-guided fuzzing + branch coverage on
      nightly toolchain). Defaults false; the `nightly` workflow normally
      fires on its named schedule (`weekly-nightly`, see project Triggers).
      Set this to true via the "Trigger Pipeline" UI or `circleci-cli` to
      run the nightly suite on demand.

# Self-hosted CircleCI runner executors (org-supplied; see admin's snippet).
# Working directory namespaced per pipeline.id because the runners are
# non-ephemeral — without namespacing, concurrent pipelines collide.
executors:
  self-hosted-amd:
    machine: true
    resource_class: runner-ns/clustered-linux-vm
    working_directory: /tmp/workspace/<< pipeline.id >>
  self-hosted-arm:
    machine: true
    resource_class: runner-ns/clustered-linux-vm-arm
    working_directory: /tmp/workspace/<< pipeline.id >>

commands:
  setup-rust:
    description: "Install rustup (no default toolchain — rust-toolchain.toml drives the actual install on first cargo invocation) and sccache (used as RUSTC_WRAPPER on non-release jobs)."
    steps:
      - run:
          name: Install Rust toolchain + sccache
          command: |
            # Self-hosted runners are bare Ubuntu — install rustup first.
            # The --default-toolchain none flag avoids installing stable;
            # rustup will install the version pinned in rust-toolchain.toml
            # when cargo is invoked below.
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain none --profile minimal
            echo 'source $HOME/.cargo/env' >> "$BASH_ENV"
            source "$BASH_ENV"
            rustup show
            rustc --version
            # sccache (prebuilt binary; org pattern, fast).
            SCCACHE_VERSION="0.8.2"
            curl -LsSf "https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
              | tar zxf - -C "$HOME/.cargo/bin" --strip-components=1 \
                "sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache"
            sccache --version
            echo 'export RUSTC_WRAPPER=sccache' >> "$BASH_ENV"
            echo 'export SCCACHE_DIR=$HOME/.cache/sccache' >> "$BASH_ENV"

  restore-cargo-cache:
    description: "Restore cargo registry/git/target caches keyed on Cargo.lock checksum."
    steps:
      - restore_cache:
          keys:
            - cargo-v2-x86_64-unknown-linux-gnu-{{ checksum "Cargo.lock" }}
            - cargo-v2-x86_64-unknown-linux-gnu-

  save-cargo-cache:
    description: "Persist cargo registry/git/bin/target/sccache and rustup caches keyed on Cargo.lock checksum."
    steps:
      - save_cache:
          key: cargo-v2-x86_64-unknown-linux-gnu-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
            - ~/.cargo/bin
            - ~/.cache/sccache
            - ~/.rustup
            - target

jobs:
  cargo-check:
    executor: self-hosted-amd
    steps:
      - checkout
      - restore-cargo-cache
      - setup-rust
      - run:
          name: cargo check --workspace --all-targets
          # Faster than `cargo build` and covers binaries (which `cargo
          # nextest run` does not). Replaces the previous cargo-build job.
          command: cargo check --workspace --all-targets
      - save-cargo-cache

  cargo-test:
    executor: self-hosted-amd
    steps:
      - checkout
      - restore-cargo-cache
      - setup-rust
      - run:
          name: Install cargo-nextest (prebuilt binary, fast)
          command: |
            curl -LsSf https://get.nexte.st/latest/linux \
              | tar zxf - -C "$HOME/.cargo/bin"
            cargo nextest --version
      - run:
          name: cargo nextest run --profile ci --workspace
          environment:
            INSTA_UPDATE: "no"
          # `--profile ci` selects [profile.ci] from .config/nextest.toml,
          # which sets fail-fast=false, slow-timeout, JUnit emission, and
          # stdout/stderr capture for failed tests.
          command: cargo nextest run --profile ci --workspace
      - store_test_results:
          # CircleCI parses JUnit XML and surfaces per-test failures in
          # the UI. Path matches [profile.ci.junit].path resolved relative
          # to target/nextest/ci/.
          path: target/nextest/ci/
      - store_artifacts:
          path: target/nextest/ci/
          destination: nextest
      - save-cargo-cache

  cargo-clippy:
    executor: self-hosted-amd
    steps:
      - checkout
      - restore-cargo-cache
      - setup-rust
      - run:
          name: rustup add clippy component
          command: rustup component add clippy
      - run:
          name: cargo clippy --workspace --all-targets -- -D warnings
          command: cargo clippy --workspace --all-targets -- -D warnings
      - save-cargo-cache

  cargo-fmt:
    executor: self-hosted-amd
    steps:
      - checkout
      - restore-cargo-cache
      - setup-rust
      - run:
          name: rustup add rustfmt component
          command: rustup component add rustfmt
      - run:
          name: cargo fmt --all -- --check
          command: cargo fmt --all -- --check
      - save-cargo-cache

  cargo-deny:
    executor: self-hosted-amd
    steps:
      - checkout
      - restore-cargo-cache
      - setup-rust
      - run:
          name: Install cargo-deny (prebuilt binary)
          command: |
            CARGO_DENY_VERSION="0.19.4"
            curl -LsSf "https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}/cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
              | tar zxf - -C "$HOME/.cargo/bin" --strip-components=1 \
                "cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl/cargo-deny"
            cargo deny --version
      - run:
          name: cargo deny check all
          command: cargo deny check all
      - save-cargo-cache

  cargo-doc:
    executor: self-hosted-amd
    environment:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - checkout
      - restore-cargo-cache
      - setup-rust
      - run:
          name: cargo doc --workspace --no-deps
          command: cargo doc --workspace --no-deps
      - save-cargo-cache

  manifest-invariants:
    executor: self-hosted-amd
    steps:
      - checkout
      - restore-cargo-cache
      - setup-rust   # need cargo for cargo metadata in the second script
      - run:
          name: scripts/check-manifest-invariants.sh
          command: ./scripts/check-manifest-invariants.sh
      - run:
          name: scripts/check-cargo-metadata.sh
          command: ./scripts/check-cargo-metadata.sh
      - save-cargo-cache

  cargo-package-check:
    executor: self-hosted-amd
    steps:
      - checkout
      - restore-cargo-cache
      - setup-rust
      - run:
          name: cargo package --list (file inclusion sanity for all 3 crates)
          # `--list` does no dep resolution, so it works for all crates
          # regardless of whether transitive path-deps are published. Catches
          # accidentally-included files (e.g., target/, secrets, large fixtures).
          command: |
            for crate in influxdb3-plugin-schemas influxdb3-plugin-sdk influxdb3-plugin-cli; do
                echo "=== cargo package --list -p $crate ==="
                cargo package --list -p "$crate"
            done
      - run:
          name: cargo package --no-verify -p schemas (full check; only viable for the leaf crate)
          # sdk and cli depend on schemas via path; cargo package resolves
          # the path-dep's version constraint from crates.io during "prepare
          # local package for uploading" (which `--no-verify` does NOT skip),
          # and the unpublished schemas dep makes that lookup fail. Group H
          # lifts this; until then, only schemas can be fully packaged.
          command: cargo package --no-verify -p influxdb3-plugin-schemas
      - save-cargo-cache

  cargo-coverage:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - restore-cargo-cache
      - run:
          name: Install cargo-nextest (prebuilt binary, fast)
          # Same install as cargo-test; cached after first run via
          # ~/.cargo/bin from PR 2's caching.
          command: |
            curl -LsSf https://get.nexte.st/latest/linux \
              | tar zxf - -C "$HOME/.cargo/bin"
            cargo nextest --version
      - run:
          name: Install cargo-llvm-cov + llvm-tools-preview
          command: |
            rustup component add llvm-tools-preview
            cargo install cargo-llvm-cov --locked
            cargo llvm-cov --version
      - run:
          name: cargo llvm-cov nextest --profile ci --workspace
          environment:
            INSTA_UPDATE: "no"
          command: |
            cargo llvm-cov --no-report nextest --profile ci --workspace
            cargo llvm-cov report --lcov --output-path lcov.info
            cargo llvm-cov report --html --output-dir target/coverage-html
            cargo llvm-cov report --json --output-path coverage.json
            # Human-readable summary in the job log (always last so it
            # is visible at the bottom of the CircleCI log).
            cargo llvm-cov report --summary-only
      - store_artifacts:
          path: lcov.info
      - store_artifacts:
          path: target/coverage-html
          destination: coverage-html
      - store_artifacts:
          path: coverage.json
      - save-cargo-cache

  cargo-mutants-full:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - restore-cargo-cache
      - run:
          name: Install cargo-mutants (cached after first run via ~/.cargo/bin)
          command: cargo install cargo-mutants --locked
      - run:
          name: cargo mutants (full sweep, no --in-diff)
          # Expected runtime: 30 minutes to several hours depending on
          # mutant count and core availability. The artifact is the work
          # backlog for the following week's triage.
          no_output_timeout: 6h
          command: cargo mutants --jobs 8 --timeout-multiplier 2.0
      - store_artifacts:
          path: mutants.out/
      - save-cargo-cache

  cargo-fuzz-parsers:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - restore-cargo-cache
      - run:
          name: Install nightly toolchain + cargo-bolero
          # Nightly is installed only inside this job; the project's
          # rust-toolchain.toml stays pinned to 1.94 stable everywhere
          # else.
          command: |
            rustup toolchain install nightly --profile minimal
            cargo +nightly install cargo-bolero --locked
            cargo +nightly bolero --version
      - restore_cache:
          # Save-unique / restore-by-prefix pattern. Each save uses a
          # unique key (suffixed with epoch below) so save_cache never
          # short-circuits; restore here always falls through to the
          # prefix match and picks up the most recent corpus for the
          # branch (or, failing that, any branch's most recent).
          keys:
            - fuzz-corpus-{{ .Branch }}-
            - fuzz-corpus-
      - run:
          name: Fuzz fuzz_manifest_parse for 30 minutes
          no_output_timeout: 35m
          command: cargo +nightly bolero test fuzz_manifest_parse --time 1800
      - run:
          name: Fuzz fuzz_index_parse for 30 minutes
          no_output_timeout: 35m
          command: cargo +nightly bolero test fuzz_index_parse --time 1800
      - save_cache:
          # Unique per-run key — guarantees the cache is rewritten so
          # the corpus accumulates findings across runs rather than
          # being frozen at the first save.
          key: fuzz-corpus-{{ .Branch }}-{{ epoch }}
          paths: [fuzz/corpus]
      - store_artifacts:
          path: fuzz/corpus
      - store_artifacts:
          path: fuzz/artifacts
      - save-cargo-cache

  cargo-coverage-nightly:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - restore-cargo-cache
      - run:
          name: Install nightly toolchain + llvm-tools-preview + cargo-llvm-cov + cargo-nextest
          command: |
            rustup toolchain install nightly --profile minimal --component llvm-tools-preview
            cargo install cargo-llvm-cov --locked
            curl -LsSf https://get.nexte.st/latest/linux \
              | tar zxf - -C "$HOME/.cargo/bin"
            cargo +nightly llvm-cov --version
      - run:
          name: cargo +nightly llvm-cov nextest --branch
          # Branch coverage is unstable; nightly toolchain is required.
          # The #[cfg_attr(coverage_nightly, coverage(off))] attribute
          # also takes effect under this invocation, so source-level
          # exclusions added in a follow-up PR will work here.
          environment:
            INSTA_UPDATE: "no"
          command: |
            cargo +nightly llvm-cov nextest --profile ci --workspace --branch \
              --json --output-path coverage-nightly.json
            cargo +nightly llvm-cov report --html --output-dir target/coverage-nightly-html
            cargo +nightly llvm-cov report --summary-only
      - store_artifacts:
          path: coverage-nightly.json
      - store_artifacts:
          path: target/coverage-nightly-html
          destination: coverage-nightly-html
      - save-cargo-cache

workflows:
  ci:
    jobs:
      - cargo-check
      - cargo-test
      - cargo-coverage
      - cargo-clippy
      - cargo-fmt
      - cargo-deny
      - cargo-doc
      - manifest-invariants
      - cargo-package-check

  nightly:
    when:
      or:
        - << pipeline.parameters.run_nightly >>
        - and:
            - equal: [scheduled_pipeline, << pipeline.trigger_source >>]
            - equal: ["weekly-nightly", << pipeline.schedule.name >>]
    jobs:
      - cargo-mutants-full
      - cargo-fuzz-parsers
      - cargo-coverage-nightly
