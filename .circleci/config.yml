version: 2.1

# Self-hosted CircleCI runner executors (org-supplied; see admin's snippet).
# Working directory namespaced per pipeline.id because the runners are
# non-ephemeral — without namespacing, concurrent pipelines collide.
executors:
  self-hosted-amd:
    machine: true
    resource_class: runner-ns/clustered-linux-vm
    working_directory: /tmp/workspace/<< pipeline.id >>
  self-hosted-arm:
    machine: true
    resource_class: runner-ns/clustered-linux-vm-arm
    working_directory: /tmp/workspace/<< pipeline.id >>

commands:
  setup-rust:
    description: "Install rustup with no default toolchain; rust-toolchain.toml drives the actual install on first cargo invocation."
    steps:
      - run:
          name: Install Rust toolchain
          command: |
            # Self-hosted runners are bare Ubuntu — install rustup first.
            # The --default-toolchain none flag avoids installing stable;
            # rustup will install the version pinned in rust-toolchain.toml
            # when cargo is invoked below.
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain none --profile minimal
            echo 'source $HOME/.cargo/env' >> "$BASH_ENV"
            source "$BASH_ENV"
            rustup show
            rustc --version

jobs:
  cargo-build:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: cargo build --workspace
          command: cargo build --workspace

  cargo-test:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: Install cargo-nextest (prebuilt binary, fast)
          command: |
            curl -LsSf https://get.nexte.st/latest/linux \
              | tar zxf - -C "$HOME/.cargo/bin"
            cargo nextest --version
      - run:
          name: cargo nextest run --workspace
          environment:
            INSTA_UPDATE: "no"
          command: cargo nextest run --workspace --no-fail-fast

  cargo-clippy:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: rustup add clippy component
          command: rustup component add clippy
      - run:
          name: cargo clippy --workspace --all-targets -- -D warnings
          command: cargo clippy --workspace --all-targets -- -D warnings

  cargo-fmt:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: rustup add rustfmt component
          command: rustup component add rustfmt
      - run:
          name: cargo fmt --all -- --check
          command: cargo fmt --all -- --check

  cargo-deny:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: Install cargo-deny (prebuilt binary)
          command: |
            CARGO_DENY_VERSION="0.19.4"
            curl -LsSf "https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}/cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
              | tar zxf - -C "$HOME/.cargo/bin" --strip-components=1 \
                "cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl/cargo-deny"
            cargo deny --version
      - run:
          name: cargo deny check all
          command: cargo deny check all

  cargo-doc:
    executor: self-hosted-amd
    environment:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - checkout
      - setup-rust
      - run:
          name: cargo doc --workspace --no-deps
          command: cargo doc --workspace --no-deps

  # ---------- TEMPORARY PROBE JOBS ----------
  # These jobs only run on the ci/release-auth-probe branch (per the
  # auth-probe workflow filter below). They surface what auth flows
  # work BEFORE PR-7's release workflow commits to a specific design.
  # Remove this whole block + the auth-probe workflow once PR-7 lands.

  release-auth-probe:
    machine: true
    resource_class: runner-ns/clustered-linux-vm
    working_directory: /tmp/workspace/<< pipeline.id >>
    steps:
      - run:
          name: Probe environment
          command: |
            echo "=== Env-var presence ==="
            for v in CIRCLE_OIDC_TOKEN CIRCLE_OIDC_TOKEN_V2 \
                     GCP_PROJECT_ID GCP_SERVICE_ACCOUNT_EMAIL \
                     GCP_WIP_ID GCP_WIP_PROVIDER_ID; do
                val="${!v:-}"
                if [ -n "$val" ]; then
                    printf '%s: SET (len=%d)\n' "$v" "${#val}"
                else
                    printf '%s: UNSET\n' "$v"
                fi
            done
      - run:
          name: Install gcloud
          command: |
            curl -sSL https://sdk.cloud.google.com | bash >/dev/null
            echo 'source $HOME/google-cloud-sdk/path.bash.inc' >> "$BASH_ENV"
            source "$BASH_ENV"
            gcloud --version | head -1 && echo "GCLOUD_INSTALL_OK"
      - run:
          name: Generate WIF cred config
          command: |
            # Pick whichever OIDC token env var is set
            TOKEN="${CIRCLE_OIDC_TOKEN_V2:-${CIRCLE_OIDC_TOKEN:-}}"
            [ -n "$TOKEN" ] || { echo "ERROR: no OIDC token in env"; exit 1; }
            umask 077
            echo "$TOKEN" > /tmp/circleci_oidc_token
            cat > /tmp/gcp_cred_config.json \<<JSON
            {
              "type": "external_account",
              "audience": "//iam.googleapis.com/projects/${GCP_PROJECT_ID}/locations/global/workloadIdentityPools/${GCP_WIP_ID}/providers/${GCP_WIP_PROVIDER_ID}",
              "subject_token_type": "urn:ietf:params:oauth:token-type:jwt",
              "service_account_impersonation_url": "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/${GCP_SERVICE_ACCOUNT_EMAIL}:generateAccessToken",
              "token_url": "https://sts.googleapis.com/v1/token",
              "credential_source": {
                "file": "/tmp/circleci_oidc_token"
              }
            }
            JSON
            echo "WIF_CONFIG_GENERATED"
            echo "Audience: //iam.googleapis.com/projects/$GCP_PROJECT_ID/locations/global/workloadIdentityPools/$GCP_WIP_ID/providers/$GCP_WIP_PROVIDER_ID"
            echo "SA: $GCP_SERVICE_ACCOUNT_EMAIL"
      - run:
          name: WIF token exchange (gcloud auth login)
          command: |
            source "$BASH_ENV"
            gcloud auth login --cred-file=/tmp/gcp_cred_config.json && echo "WIF_LOGIN_OK"
      - run:
          name: Get GCP access token
          command: |
            source "$BASH_ENV"
            gcloud auth print-access-token > /tmp/gcp_access_token \
                && echo "ACCESS_TOKEN_OK (len=$(wc -c < /tmp/gcp_access_token))"
      - run:
          name: Docker login to GAR
          command: |
            cat /tmp/gcp_access_token \
                | docker login -u oauth2accesstoken --password-stdin \
                  https://us-east1-docker.pkg.dev \
                && echo "GAR_LOGIN_OK"
      - run:
          name: Pull the cross-builder image
          command: |
            docker pull us-east1-docker.pkg.dev/influxdata-team-edge/ci-support/ci-cross-influxdb3@sha256:98b05538182a2e4eac5ce96150a1f5c552de48a7d3ea8d312d38e45f0dd42611 \
                && echo "PULL_OK" \
                || { echo "PULL_FAIL"; exit 1; }

  github-token-probe:
    executor: self-hosted-amd
    steps:
      - run:
          name: Probe github-token-ci capabilities
          command: |
            [ -n "${GITHUB_TOKEN:-}" ] || { echo "ERROR: GITHUB_TOKEN not set"; exit 1; }
            echo "GITHUB_TOKEN: SET (len=${#GITHUB_TOKEN})"

            # Headers reveal token scopes (classic PATs) or null (fine-grained / GitHub App)
            echo "=== Token scope inspection (response headers) ==="
            curl -sIH "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/influxdata/influxdb3-plugin-sdk" \
                | grep -i "x-oauth-scopes\|x-accepted-oauth-scopes\|x-github-token-expiration" \
                || echo "(no x-oauth-scopes / x-accepted-oauth-scopes headers — likely fine-grained PAT or GitHub App token)"

            echo "=== Repo permissions field ==="
            curl -sH "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/influxdata/influxdb3-plugin-sdk" \
                | jq '{full_name, permissions, visibility}'

            echo "=== Releases endpoint accessibility (read) ==="
            curl -sH "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/repos/influxdata/influxdb3-plugin-sdk/releases" \
                | jq 'length' \
                && echo "RELEASES_READ_OK"

# Existing ci workflow runs on all branches (incl. the probe branch).
# The probe-only workflow runs ONLY on ci/release-auth-probe.
workflows:
  ci:
    jobs:
      - cargo-build
      - cargo-test
      - cargo-clippy
      - cargo-fmt
      - cargo-deny
      - cargo-doc

  auth-probe:
    when:
      equal: [ "ci/release-auth-probe", << pipeline.git.branch >> ]
    jobs:
      - release-auth-probe:
          context: [gcp-wif-clustered]
      - github-token-probe:
          context: [github-token-ci]
