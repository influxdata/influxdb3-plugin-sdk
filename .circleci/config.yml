version: 2.1

# Self-hosted CircleCI runner executors (org-supplied; see admin's snippet).
# Working directory namespaced per pipeline.id because the runners are
# non-ephemeral — without namespacing, concurrent pipelines collide.
executors:
  self-hosted-amd:
    machine: true
    resource_class: runner-ns/clustered-linux-vm
    working_directory: /tmp/workspace/<< pipeline.id >>
  self-hosted-arm:
    machine: true
    resource_class: runner-ns/clustered-linux-vm-arm
    working_directory: /tmp/workspace/<< pipeline.id >>

commands:
  setup-rust:
    description: "Install rustup with no default toolchain; rust-toolchain.toml drives the actual install on first cargo invocation."
    steps:
      - run:
          name: Install Rust toolchain
          command: |
            # Self-hosted runners are bare Ubuntu — install rustup first.
            # The --default-toolchain none flag avoids installing stable;
            # rustup will install the version pinned in rust-toolchain.toml
            # when cargo is invoked below.
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain none --profile minimal
            echo 'source $HOME/.cargo/env' >> "$BASH_ENV"
            source "$BASH_ENV"
            rustup show
            rustc --version

jobs:
  cargo-build:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: cargo build --workspace
          command: cargo build --workspace

  cargo-test:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: Install cargo-nextest (prebuilt binary, fast)
          command: |
            curl -LsSf https://get.nexte.st/latest/linux \
              | tar zxf - -C "$HOME/.cargo/bin"
            cargo nextest --version
      - run:
          name: cargo nextest run --workspace
          environment:
            INSTA_UPDATE: "no"
          command: cargo nextest run --workspace --no-fail-fast

  cargo-clippy:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: rustup add clippy component
          command: rustup component add clippy
      - run:
          name: cargo clippy --workspace --all-targets -- -D warnings
          command: cargo clippy --workspace --all-targets -- -D warnings

  cargo-fmt:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: rustup add rustfmt component
          command: rustup component add rustfmt
      - run:
          name: cargo fmt --all -- --check
          command: cargo fmt --all -- --check

  cargo-deny:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: Install cargo-deny (prebuilt binary)
          command: |
            CARGO_DENY_VERSION="0.19.4"
            curl -LsSf "https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}/cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
              | tar zxf - -C "$HOME/.cargo/bin" --strip-components=1 \
                "cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl/cargo-deny"
            cargo deny --version
      - run:
          name: cargo deny check all
          command: cargo deny check all

  cargo-doc:
    executor: self-hosted-amd
    environment:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - checkout
      - setup-rust
      - run:
          name: cargo doc --workspace --no-deps
          command: cargo doc --workspace --no-deps

  cargo-package-check:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: cargo package --list (file inclusion sanity for all 3 crates)
          # `--list` does no dep resolution, so it works for all crates
          # regardless of whether transitive path-deps are published. Catches
          # accidentally-included files (e.g., target/, secrets, large fixtures).
          command: |
            for crate in influxdb3-plugin-schemas influxdb3-plugin-sdk influxdb3-plugin-cli; do
                echo "=== cargo package --list -p $crate ==="
                cargo package --list -p "$crate"
            done
      - run:
          name: cargo package --no-verify -p schemas (full check; only viable for the leaf crate)
          # sdk and cli depend on schemas via path; cargo package resolves
          # the path-dep's version constraint from crates.io during "prepare
          # local package for uploading" (which `--no-verify` does NOT skip),
          # and the unpublished schemas dep makes that lookup fail. Group H
          # lifts this; until then, only schemas can be fully packaged.
          command: cargo package --no-verify -p influxdb3-plugin-schemas

workflows:
  ci:
    jobs:
      - cargo-build
      - cargo-test
      - cargo-clippy
      - cargo-fmt
      - cargo-deny
      - cargo-doc
      - cargo-package-check
