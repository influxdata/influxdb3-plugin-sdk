name: Documentation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  MDBOOK_VERSION: v0.5.3

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache mdBook
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/mdbook
          key: mdbook-${{ runner.os }}-${{ env.MDBOOK_VERSION }}

      - name: Install mdBook
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.local/bin"
          if [ ! -x "${HOME}/.local/bin/mdbook" ]; then
            curl -sSL \
              "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
              | tar -xz --directory="${HOME}/.local/bin"
          fi
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Check mdBook version
        run: mdbook --version

      - name: Build book
        run: |
          set -euo pipefail
          mdbook build docs 2>&1 | tee mdbook.log
          if grep -q " WARN " mdbook.log; then
            echo "mdBook emitted warnings; failing documentation build." >&2
            exit 1
          fi

      - name: Upload rendered book artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdbook-site
          path: docs/book
          if-no-files-found: error

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download rendered book artifact
        uses: actions/download-artifact@v4
        with:
          name: mdbook-site
          path: docs/book

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
