version: 2.1

# Self-hosted CircleCI runner executors (org-supplied; see admin's snippet).
# Default working directory is namespaced per pipeline.id because the runners
# are non-ephemeral. Self-hosted jobs override this with job-specific
# subdirectories so current-job cleanup cannot touch another job's checkout.
executors:
  self-hosted-amd:
    machine: true
    resource_class: runner-ns/clustered-linux-vm
    working_directory: /tmp/workspace/<< pipeline.id >>
  self-hosted-arm:
    machine: true
    resource_class: runner-ns/clustered-linux-vm-arm
    working_directory: /tmp/workspace/<< pipeline.id >>

commands:
  setup-rust:
    description: "Install rustup (no default toolchain — rust-toolchain.toml drives the actual install on first cargo invocation) and sccache (used as RUSTC_WRAPPER on non-release jobs)."
    steps:
      - run:
          name: Install Rust toolchain + sccache
          command: |
            # Self-hosted runners are bare Ubuntu — install rustup first.
            # The --default-toolchain none flag avoids installing stable;
            # rustup will install the version pinned in rust-toolchain.toml
            # when cargo is invoked below.
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain none --profile minimal
            echo 'source $HOME/.cargo/env' >> "$BASH_ENV"
            source "$BASH_ENV"
            rustup show
            rustc --version
            CARGO_HOME_PROJECT="$HOME/.cargo/influxdb3-plugin-sdk"
            TOOL_BIN="$(pwd)/.tools/bin"
            mkdir -p "$CARGO_HOME_PROJECT"
            mkdir -p "$TOOL_BIN"
            # sccache (prebuilt binary; org pattern, fast).
            SCCACHE_VERSION="0.8.2"
            curl -LsSf "https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
              | tar zxf - -C "$TOOL_BIN" --strip-components=1 \
                "sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache"
            "$TOOL_BIN/sccache" --version
            SCCACHE_ROOT="$(pwd)/.sccache"
            mkdir -p "$SCCACHE_ROOT"
            echo "export CARGO_HOME=$CARGO_HOME_PROJECT" >> "$BASH_ENV"
            echo "export PATH=$TOOL_BIN:\$PATH" >> "$BASH_ENV"
            echo "export RUSTC_WRAPPER=$TOOL_BIN/sccache" >> "$BASH_ENV"
            echo "export SCCACHE_DIR=$SCCACHE_ROOT" >> "$BASH_ENV"
            echo "export SCCACHE_SERVER_UDS=$SCCACHE_ROOT/server.sock" >> "$BASH_ENV"
            echo 'export SCCACHE_CACHE_SIZE=2G' >> "$BASH_ENV"

  restore-cargo-cache:
    description: "Restore repo-scoped cargo registry cache keyed on Cargo.lock checksum."
    steps:
      - restore_cache:
          keys:
            - cargo-v4-registry-x86_64-unknown-linux-gnu-{{ checksum "Cargo.lock" }}
            - cargo-v4-registry-x86_64-unknown-linux-gnu-

  save-cargo-cache:
    description: "Persist repo-scoped cargo registry cache keyed on Cargo.lock checksum."
    steps:
      - save_cache:
          key: cargo-v4-registry-x86_64-unknown-linux-gnu-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/influxdb3-plugin-sdk/registry

  cleanup-current-workspace:
    description: "Remove this job's per-pipeline workspace after cache/workspace persistence."
    steps:
      - run:
          name: Cleanup current workspace
          when: always
          command: |
            set -euo pipefail
            pipeline_root="/tmp/workspace/${CIRCLE_PIPELINE_ID:?CIRCLE_PIPELINE_ID is required for cleanup}"
            workdir="$(pwd)"
            cleanup_root="${CI_CLEANUP_ROOT:-$workdir}"
            if [ -n "${SCCACHE_SERVER_UDS:-}" ] && command -v sccache >/dev/null 2>&1; then
              sccache --stop-server || true
            fi
            if [ ! -d "$cleanup_root" ]; then
              echo "Skipping cleanup for missing directory: $cleanup_root"
              exit 0
            fi
            pipeline_root="$(cd "$pipeline_root" && pwd -P)"
            cleanup_root="$(cd "$cleanup_root" && pwd -P)"
            if [ "$cleanup_root" = "$pipeline_root" ]; then
              echo "Skipping cleanup for pipeline root: $cleanup_root"
              exit 0
            fi
            case "$cleanup_root" in
              "$pipeline_root"/*)
                parent="$(dirname "$cleanup_root")"
                cd /
                rm -rf "$cleanup_root"
                rmdir "$parent" 2>/dev/null || true
                ;;
              *)
                echo "Skipping cleanup for unexpected cleanup root: $cleanup_root"
                ;;
            esac

jobs:
  cargo-build:
    executor: self-hosted-amd
    working_directory: /tmp/workspace/<< pipeline.id >>/cargo-build
    steps:
      - checkout
      - restore-cargo-cache
      - setup-rust
      - run:
          name: cargo build --workspace
          command: cargo build --workspace --locked
      - save-cargo-cache
      - cleanup-current-workspace

  cargo-test:
    executor: self-hosted-amd
    working_directory: /tmp/workspace/<< pipeline.id >>/cargo-test
    steps:
      - checkout
      - restore-cargo-cache
      - setup-rust
      - run:
          name: Install cargo-nextest (prebuilt binary, pinned version)
          command: |
            NEXTEST_VERSION="0.9.133"
            curl -LsSf "https://get.nexte.st/${NEXTEST_VERSION}/linux" \
              | tar zxf - -C "$(pwd)/.tools/bin"
            cargo nextest --version
      - run:
          name: cargo nextest run --workspace
          environment:
            INSTA_UPDATE: "no"
          command: cargo nextest run --workspace --no-fail-fast --locked
      - cleanup-current-workspace

  cargo-clippy:
    executor: self-hosted-amd
    working_directory: /tmp/workspace/<< pipeline.id >>/cargo-clippy
    steps:
      - checkout
      - restore-cargo-cache
      - setup-rust
      - run:
          name: rustup add clippy component
          command: rustup component add clippy
      - run:
          name: cargo clippy --workspace --all-targets -- -D warnings
          command: cargo clippy --workspace --all-targets --locked -- -D warnings
      - cleanup-current-workspace

  cargo-fmt:
    executor: self-hosted-amd
    working_directory: /tmp/workspace/<< pipeline.id >>/cargo-fmt
    steps:
      - checkout
      - restore-cargo-cache
      - setup-rust
      - run:
          name: rustup add rustfmt component
          command: rustup component add rustfmt
      - run:
          name: cargo fmt --all -- --check
          command: cargo fmt --all -- --check
      - cleanup-current-workspace

  cargo-deny:
    executor: self-hosted-amd
    working_directory: /tmp/workspace/<< pipeline.id >>/cargo-deny
    steps:
      - checkout
      - restore-cargo-cache
      - setup-rust
      - run:
          name: Install cargo-deny (prebuilt binary)
          command: |
            CARGO_DENY_VERSION="0.19.4"
            curl -LsSf "https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}/cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
              | tar zxf - -C "$(pwd)/.tools/bin" --strip-components=1 \
                "cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl/cargo-deny"
            cargo deny --version
      - run:
          name: cargo deny check all
          command: cargo deny check all
      - cleanup-current-workspace

  cargo-doc:
    executor: self-hosted-amd
    working_directory: /tmp/workspace/<< pipeline.id >>/cargo-doc
    environment:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - checkout
      - restore-cargo-cache
      - setup-rust
      - run:
          name: cargo doc --workspace --no-deps
          command: cargo doc --workspace --no-deps --locked
      - cleanup-current-workspace

  manifest-invariants:
    executor: self-hosted-amd
    working_directory: /tmp/workspace/<< pipeline.id >>/manifest-invariants
    steps:
      - checkout
      - restore-cargo-cache
      - setup-rust   # need cargo for cargo metadata in the second script
      - run:
          name: scripts/check-manifest-invariants.sh
          command: ./scripts/check-manifest-invariants.sh
      - run:
          name: scripts/check-changelog-format.sh
          command: ./scripts/check-changelog-format.sh
      - run:
          name: scripts/check-changelog-updated.sh
          command: ./scripts/check-changelog-updated.sh
      - cleanup-current-workspace

  cargo-semver-checks:
    executor: self-hosted-amd
    working_directory: /tmp/workspace/<< pipeline.id >>/cargo-semver-checks/repo
    steps:
      - checkout
      - run:
          name: Fetch tags
          command: git fetch --tags origin
      - run:
          name: Clone baseline tag (sidesteps shallow-clone object issues)
          command: |
            BASELINE="$(git describe --tags --abbrev=0)"
            if [ -z "$BASELINE" ]; then
              echo "ERROR: no baseline tag found." >&2
              exit 1
            fi
            echo "Baseline tag: $BASELINE"
            JOB_ROOT="$(dirname "$(pwd)")"
            BASELINE_DIR="$JOB_ROOT/semver-baseline"
            echo "export CI_CLEANUP_ROOT=$JOB_ROOT" >> "$BASH_ENV"
            rm -rf "$BASELINE_DIR"
            git clone --depth=1 --branch "$BASELINE" \
              "$(git remote get-url origin)" "$BASELINE_DIR"
            echo "export SEMVER_BASELINE_DIR=$BASELINE_DIR" >> "$BASH_ENV"
      - restore-cargo-cache
      - setup-rust
      - run:
          name: Install cargo-semver-checks (prebuilt binary)
          command: |
            CARGO_SEMVER_CHECKS_VERSION="0.47.0"
            curl -LsSf "https://github.com/obi1kenobi/cargo-semver-checks/releases/download/v${CARGO_SEMVER_CHECKS_VERSION}/cargo-semver-checks-x86_64-unknown-linux-gnu.tar.gz" \
              | tar zxf - -C "$(pwd)/.tools/bin"
            cargo semver-checks --version
      - run:
          name: cargo semver-checks (cli + schemas only; sdk is internal)
          command: |
            source "$BASH_ENV"
            echo "Comparing against baseline at $SEMVER_BASELINE_DIR"
            cargo semver-checks check-release \
              --package influxdb3-plugin-cli \
              --package influxdb3-plugin-schemas \
              --baseline-root "$SEMVER_BASELINE_DIR"
      - cleanup-current-workspace

  cargo-package-check:
    executor: self-hosted-amd
    working_directory: /tmp/workspace/<< pipeline.id >>/cargo-package-check
    steps:
      - checkout
      - restore-cargo-cache
      - setup-rust
      - run:
          name: cargo package --list (file inclusion sanity for all 3 crates)
          # `--list` does no dep resolution, so it works for all crates
          # regardless of whether transitive path-deps are published. Catches
          # accidentally-included files (e.g., target/, secrets, large fixtures).
          command: |
            for crate in influxdb3-plugin-schemas influxdb3-plugin-sdk influxdb3-plugin-cli; do
                echo "=== cargo package --list -p $crate ==="
                cargo package --list -p "$crate"
            done
      - run:
          name: cargo package --no-verify -p schemas (full check; only viable for the leaf crate)
          # sdk and cli depend on schemas via path; cargo package resolves
          # the path-dep's version constraint from crates.io during "prepare
          # local package for uploading" (which `--no-verify` does NOT skip),
          # and the unpublished schemas dep makes that lookup fail. Group H
          # lifts this; until then, only schemas can be fully packaged.
          command: cargo package --no-verify -p influxdb3-plugin-schemas
      - cleanup-current-workspace

  # --------------- Release jobs ---------------

  build-release:
    executor: self-hosted-amd
    working_directory: /tmp/workspace/<< pipeline.id >>/build-release-<< parameters.target >>
    parameters:
      target:
        type: string
    steps:
      - checkout
      - run:
          name: Isolate gcloud and Docker config
          command: |
            export CLOUDSDK_CONFIG="$(pwd)/gcloud"
            export DOCKER_CONFIG="$(pwd)/docker"
            mkdir -p "$CLOUDSDK_CONFIG" "$DOCKER_CONFIG"
            echo "export CLOUDSDK_CONFIG=$CLOUDSDK_CONFIG" >> "$BASH_ENV"
            echo "export DOCKER_CONFIG=$DOCKER_CONFIG" >> "$BASH_ENV"
      - run:
          name: Install gcloud
          no_output_timeout: 5m
          command: |
            source "$BASH_ENV"
            GCLOUD_ROOT="$(pwd)/google-cloud-sdk"
            curl -fsSL \
              https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/google-cloud-cli-linux-x86_64.tar.gz \
              | tar xz -C "$(pwd)"
            echo "export PATH=$GCLOUD_ROOT/bin:\$PATH" >> "$BASH_ENV"
      - run:
          name: WIF login as dedicated SA
          command: |
            source "$BASH_ENV"
            source "$BASH_ENV"
            TOKEN="${CIRCLE_OIDC_TOKEN:-}"
            [ -n "$TOKEN" ] || { echo "ERROR: no V1 OIDC token"; exit 1; }
            umask 077
            OIDC_FILE="$CLOUDSDK_CONFIG/circleci_oidc_token"
            CRED_FILE="$CLOUDSDK_CONFIG/gcp_cred_config.json"
            echo "$TOKEN" > "$OIDC_FILE"
            cat > "$CRED_FILE" \<<JSON
            {
              "type": "external_account",
              "audience": "//iam.googleapis.com/projects/${GCP_PROJECT_ID}/locations/global/workloadIdentityPools/${GCP_WIP_ID}/providers/${GCP_WIP_PROVIDER_ID}",
              "subject_token_type": "urn:ietf:params:oauth:token-type:jwt",
              "service_account_impersonation_url": "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/${GCP_SERVICE_ACCOUNT_EMAIL}:generateAccessToken",
              "token_url": "https://sts.googleapis.com/v1/token",
              "credential_source": { "file": "$OIDC_FILE" }
            }
            JSON
            gcloud auth login --cred-file="$CRED_FILE"
      - run:
          # Wires gcloud's WIF-issued access token into the docker
          # daemon's credential helper for us-east1-docker.pkg.dev. The
          # self-hosted runner fleet has some instances whose
          # ~/.docker/config.json lacks the credHelpers entry for this
          # registry; without configure-docker, those runners fall back
          # to anonymous pulls and fail with
          # `Unauthenticated request ... artifactregistry.repositories.downloadArtifacts`
          # at docker pull time even though `gcloud auth login`
          # succeeded. Running configure-docker here makes the job
          # independent of per-runner baked state.
          name: Configure docker credential helper for Artifact Registry
          command: |
            source "$BASH_ENV"
            gcloud auth configure-docker us-east1-docker.pkg.dev --quiet
      - run:
          name: Pull cross-builder image
          no_output_timeout: 15m
          command: |
            source "$BASH_ENV"
            docker pull us-east1-docker.pkg.dev/influxdata-team-edge/ci-support/ci-cross-influxdb3@sha256:98b05538182a2e4eac5ce96150a1f5c552de48a7d3ea8d312d38e45f0dd42611
      - run:
          name: Fetch latest influxdb3 version for INFLUXDB3_PLUGIN_SDK_KNOWN_LATEST_DB
          command: |
            TAG="$(curl -fsSL https://api.github.com/repos/influxdata/influxdb/releases/latest \
                   | jq -r '.tag_name')" || { echo "ERROR: failed to fetch latest influxdb3 release tag" >&2; exit 1; }
            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "ERROR: empty/null tag_name from GitHub API" >&2; exit 1
            fi
            VERSION="${TAG#v}"
            echo "export INFLUXDB3_PLUGIN_SDK_KNOWN_LATEST_DB=$VERSION" >> "$BASH_ENV"
            echo "INFLUXDB3_PLUGIN_SDK_KNOWN_LATEST_DB=$VERSION"
      - run:
          name: Cross-compile << parameters.target >>
          no_output_timeout: 60m
          command: |
            source "$BASH_ENV"
            IMAGE="us-east1-docker.pkg.dev/influxdata-team-edge/ci-support/ci-cross-influxdb3@sha256:98b05538182a2e4eac5ce96150a1f5c552de48a7d3ea8d312d38e45f0dd42611"
            docker run --rm \
              -v "$(pwd)":/workspace \
              -w /workspace \
              -e "TARGET=<< parameters.target >>" \
              -e "GIT_HASH=$CIRCLE_SHA1" \
              -e "INFLUXDB3_PLUGIN_SDK_KNOWN_LATEST_DB=$INFLUXDB3_PLUGIN_SDK_KNOWN_LATEST_DB" \
              -e "RUSTC_WRAPPER=" \
              "$IMAGE" \
              bash -c "rustup target add << parameters.target >> && target-env cargo build --release --locked --target << parameters.target >> -p influxdb3-plugin-cli"
      - run:
          name: Ad-hoc codesign Darwin binary (prevents macOS "damaged" errors)
          command: |
            case "<< parameters.target >>" in
              *apple-darwin*)
                IMAGE="us-east1-docker.pkg.dev/influxdata-team-edge/ci-support/ci-cross-influxdb3@sha256:98b05538182a2e4eac5ce96150a1f5c552de48a7d3ea8d312d38e45f0dd42611"
                docker run --rm \
                  -v "$(pwd)":/workspace \
                  -w /workspace \
                  "$IMAGE" \
                  rcodesign sign "target/<< parameters.target >>/release/influxdb3-plugin"
                echo "Signed << parameters.target >> binary with rcodesign (ad-hoc)"
                ;;
              *) echo "Skipping codesign (not a Darwin target)" ;;
            esac
      - run:
          name: Tarball the binary + license files
          command: |
            mkdir -p artifacts staging
            BINARY_NAME=influxdb3-plugin
            case "<< parameters.target >>" in
              *windows*) BINARY_NAME=influxdb3-plugin.exe ;;
            esac
            cp "target/<< parameters.target >>/release/$BINARY_NAME" staging/
            cp LICENSE-MIT LICENSE-APACHE staging/
            tar -czf "artifacts/influxdb3-plugin-<< parameters.target >>.tar.gz" \
              -C staging "$BINARY_NAME" LICENSE-MIT LICENSE-APACHE
      - persist_to_workspace:
          root: .
          paths:
            - artifacts/
      - cleanup-current-workspace

  generate-checksums:
    docker:
      - image: cimg/base:current
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Generate SHA256SUMS
          command: |
            cd artifacts
            sha256sum *.tar.gz > SHA256SUMS
            cat SHA256SUMS
      - persist_to_workspace:
          root: .
          paths:
            - artifacts/SHA256SUMS

  verify-release-binaries:
    docker:
      - image: cimg/base:current
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Per-target verification of release binaries
          command: |
            set -euo pipefail
            cd artifacts
            errors=0

            sha256sum -c SHA256SUMS || { echo "FAIL: SHA256SUMS doesn't match actual files" >&2; errors=$((errors+1)); }

            for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu \
                          aarch64-apple-darwin x86_64-pc-windows-gnu; do
                tarball="influxdb3-plugin-${target}.tar.gz"
                if [ ! -s "$tarball" ]; then
                    echo "FAIL: $tarball is missing or empty" >&2
                    errors=$((errors+1))
                    continue
                fi

                extract_dir="extracted-${target}"
                mkdir -p "$extract_dir"
                tar -xzf "$tarball" -C "$extract_dir"

                bin_name="influxdb3-plugin"
                case "$target" in *windows*) bin_name="influxdb3-plugin.exe" ;; esac
                bin_path="$extract_dir/$bin_name"
                if [ ! -s "$bin_path" ]; then
                    echo "FAIL: $tarball does not contain a non-empty $bin_name" >&2
                    errors=$((errors+1))
                    continue
                fi

                # Verify binary architecture matches the target
                actual_arch="$(file "$bin_path")"
                case "$target" in
                  x86_64-unknown-linux-gnu)
                    echo "$actual_arch" | grep -cF "ELF 64-bit" > /dev/null && \
                    echo "$actual_arch" | grep -cF "x86-64" > /dev/null || {
                      echo "FAIL: $bin_name is not ELF x86-64: $actual_arch" >&2
                      errors=$((errors+1)); continue; } ;;
                  aarch64-unknown-linux-gnu)
                    echo "$actual_arch" | grep -cF "ELF 64-bit" > /dev/null && \
                    echo "$actual_arch" | grep -ciE "aarch64|arm64" > /dev/null || {
                      echo "FAIL: $bin_name is not ELF aarch64: $actual_arch" >&2
                      errors=$((errors+1)); continue; } ;;
                  aarch64-apple-darwin)
                    echo "$actual_arch" | grep -cF "Mach-O" > /dev/null && \
                    echo "$actual_arch" | grep -ciE "arm64|aarch64" > /dev/null || {
                      echo "FAIL: $bin_name is not Mach-O arm64: $actual_arch" >&2
                      errors=$((errors+1)); continue; } ;;
                  x86_64-pc-windows-gnu)
                    echo "$actual_arch" | grep -cF "PE32+" > /dev/null && \
                    echo "$actual_arch" | grep -ciE "x86-64|x86_64" > /dev/null || {
                      echo "FAIL: $bin_name is not PE32+ x86-64: $actual_arch" >&2
                      errors=$((errors+1)); continue; } ;;
                esac

                if ! strings "$bin_path" | grep -cF "$CIRCLE_SHA1" > /dev/null; then
                    echo "FAIL: $bin_name does not contain CIRCLE_SHA1=$CIRCLE_SHA1 in its strings" >&2
                    echo "  Binary's 'revision' string:" >&2
                    strings "$bin_path" | grep -i "revision" | head -3 >&2
                    echo "  Any 40-hex strings in binary:" >&2
                    strings "$bin_path" | grep -oE '[a-f0-9]{40}' | head -3 >&2
                    errors=$((errors+1))
                    continue
                fi

                if [ "$target" = "x86_64-unknown-linux-gnu" ]; then
                    actual="$($bin_path --version)"
                    if ! echo "$actual" | grep -cF "revision $CIRCLE_SHA1" > /dev/null; then
                        echo "FAIL: $bin_name --version doesn't contain revision $CIRCLE_SHA1" >&2
                        echo "  Got: $actual" >&2
                        errors=$((errors+1))
                        continue
                    fi
                fi

                echo "OK: $tarball verified"
            done

            if [ "$errors" -gt 0 ]; then
                echo "$errors verification failure(s)." >&2
                exit 1
            fi
            echo "All 4 release binaries verified."

  publish-github-release:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Install gh CLI
          command: |
            GH_VERSION="2.65.0"
            curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" \
              | tar xz -C /tmp
            sudo mv "/tmp/gh_${GH_VERSION}_linux_amd64/bin/gh" /usr/local/bin/gh
            gh --version
      - run:
          name: Extract release notes from CHANGELOG.md
          command: |
            VERSION="${CIRCLE_TAG#v}"
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { in_section=1; next }
              in_section && /^## \[/ { exit }
              in_section { print }
            ' CHANGELOG.md > /tmp/release-notes.md
            if [ ! -s /tmp/release-notes.md ]; then
              echo "ERROR: no CHANGELOG.md section for [$VERSION]." >&2
              echo "S2-20 requires release notes. Add a ## [$VERSION] section to CHANGELOG.md" >&2
              echo "before tagging. See RELEASE.md step 2." >&2
              exit 1
            fi
            cat /tmp/release-notes.md
      - run:
          name: Create GitHub Release and upload assets
          command: |
            PRERELEASE_FLAG=""
            if [[ "$CIRCLE_TAG" == *-* ]]; then
              PRERELEASE_FLAG="--prerelease"
              echo "Tag $CIRCLE_TAG is a prerelease (contains '-')."
            fi
            gh release create "$CIRCLE_TAG" \
              --repo influxdata/influxdb3-plugin-sdk \
              --title "$CIRCLE_TAG" \
              --notes-file /tmp/release-notes.md \
              $PRERELEASE_FLAG \
              artifacts/*

workflows:
  ci:
    jobs:
      - cargo-build
      - cargo-test
      - cargo-clippy
      - cargo-fmt
      - cargo-deny
      - cargo-doc
      - manifest-invariants
      - cargo-semver-checks
      - cargo-package-check

  release:
    jobs:
      - build-release:
          context: [influxdb3-plugin-sdk-gcp]
          matrix:
            parameters:
              target:
                - x86_64-unknown-linux-gnu
                - aarch64-unknown-linux-gnu
                - aarch64-apple-darwin
                - x86_64-pc-windows-gnu
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+(-[0-9]+\.(alpha|beta|rc)\.[0-9]+)?$/
            branches:
              ignore: /.*/
      - generate-checksums:
          requires:
            - build-release
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+(-[0-9]+\.(alpha|beta|rc)\.[0-9]+)?$/
            branches:
              ignore: /.*/
      - verify-release-binaries:
          requires:
            - generate-checksums
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+(-[0-9]+\.(alpha|beta|rc)\.[0-9]+)?$/
            branches:
              ignore: /.*/
      - publish-github-release:
          requires:
            - verify-release-binaries
          context: [influxdb3-plugin-sdk-github]
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+(-[0-9]+\.(alpha|beta|rc)\.[0-9]+)?$/
            branches:
              ignore: /.*/
