version: 2.1

# Self-hosted CircleCI runner executors (org-supplied; see admin's snippet).
# Working directory namespaced per pipeline.id because the runners are
# non-ephemeral — without namespacing, concurrent pipelines collide.
executors:
  self-hosted-amd:
    machine: true
    resource_class: runner-ns/clustered-linux-vm
    working_directory: /tmp/workspace/<< pipeline.id >>
  self-hosted-arm:
    machine: true
    resource_class: runner-ns/clustered-linux-vm-arm
    working_directory: /tmp/workspace/<< pipeline.id >>

commands:
  setup-rust:
    description: "Install rustup with no default toolchain; rust-toolchain.toml drives the actual install on first cargo invocation."
    steps:
      - run:
          name: Install Rust toolchain
          command: |
            # Self-hosted runners are bare Ubuntu — install rustup first.
            # The --default-toolchain none flag avoids installing stable;
            # rustup will install the version pinned in rust-toolchain.toml
            # when cargo is invoked below.
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain none --profile minimal
            echo 'source $HOME/.cargo/env' >> "$BASH_ENV"
            source "$BASH_ENV"
            rustup show
            rustc --version

jobs:
  cargo-build:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: cargo build --workspace
          command: cargo build --workspace

  cargo-test:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: Install cargo-nextest (prebuilt binary, fast)
          command: |
            curl -LsSf https://get.nexte.st/latest/linux \
              | tar zxf - -C "$HOME/.cargo/bin"
            cargo nextest --version
      - run:
          name: cargo nextest run --workspace
          environment:
            INSTA_UPDATE: "no"
          command: cargo nextest run --workspace --no-fail-fast

  cargo-clippy:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: rustup add clippy component
          command: rustup component add clippy
      - run:
          name: cargo clippy --workspace --all-targets -- -D warnings
          command: cargo clippy --workspace --all-targets -- -D warnings

  cargo-fmt:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: rustup add rustfmt component
          command: rustup component add rustfmt
      - run:
          name: cargo fmt --all -- --check
          command: cargo fmt --all -- --check

  cargo-deny:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: Install cargo-deny (prebuilt binary)
          command: |
            CARGO_DENY_VERSION="0.19.4"
            curl -LsSf "https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}/cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
              | tar zxf - -C "$HOME/.cargo/bin" --strip-components=1 \
                "cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl/cargo-deny"
            cargo deny --version
      - run:
          name: cargo deny check all
          command: cargo deny check all

  cargo-doc:
    executor: self-hosted-amd
    environment:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - checkout
      - setup-rust
      - run:
          name: cargo doc --workspace --no-deps
          command: cargo doc --workspace --no-deps

  manifest-invariants:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust   # need cargo for cargo metadata in the second script
      - run:
          name: scripts/check-manifest-invariants.sh
          command: ./scripts/check-manifest-invariants.sh
      - run:
          name: scripts/check-cargo-metadata.sh
          command: ./scripts/check-cargo-metadata.sh

  cargo-package-check:
    executor: self-hosted-amd
    steps:
      - checkout
      - setup-rust
      - run:
          name: cargo package --list (file inclusion sanity for all 3 crates)
          # `--list` does no dep resolution, so it works for all crates
          # regardless of whether transitive path-deps are published. Catches
          # accidentally-included files (e.g., target/, secrets, large fixtures).
          command: |
            for crate in influxdb3-plugin-schemas influxdb3-plugin-sdk influxdb3-plugin-cli; do
                echo "=== cargo package --list -p $crate ==="
                cargo package --list -p "$crate"
            done
      - run:
          name: cargo package --no-verify -p schemas (full check; only viable for the leaf crate)
          # sdk and cli depend on schemas via path; cargo package resolves
          # the path-dep's version constraint from crates.io during "prepare
          # local package for uploading" (which `--no-verify` does NOT skip),
          # and the unpublished schemas dep makes that lookup fail. Group H
          # lifts this; until then, only schemas can be fully packaged.
          command: cargo package --no-verify -p influxdb3-plugin-schemas

  # Temporary probe (do not merge) — deep diagnostic for GAR pull failure.
  release-auth-probe-v3:
    machine: true
    resource_class: runner-ns/clustered-linux-vm
    working_directory: /tmp/workspace/<< pipeline.id >>
    steps:
      - run:
          name: Install gcloud + jq
          no_output_timeout: 5m
          command: |
            curl -fsSL \
              https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/google-cloud-cli-linux-x86_64.tar.gz \
              | tar xz -C $HOME
            echo 'export PATH=$HOME/google-cloud-sdk/bin:$PATH' >> "$BASH_ENV"
            source "$BASH_ENV"
            # jq might not be on the bare runner
            which jq || { sudo apt-get update -qq && sudo apt-get install -y -qq jq; }
      - run:
          name: WIF login
          command: |
            source "$BASH_ENV"
            TOKEN="${CIRCLE_OIDC_TOKEN:-}"
            [ -n "$TOKEN" ] || { echo "no V1 OIDC token"; exit 1; }
            umask 077
            echo "$TOKEN" > /tmp/circleci_oidc_token
            cat > /tmp/gcp_cred_config.json \<<JSON
            {
              "type": "external_account",
              "audience": "//iam.googleapis.com/projects/${GCP_PROJECT_ID}/locations/global/workloadIdentityPools/${GCP_WIP_ID}/providers/${GCP_WIP_PROVIDER_ID}",
              "subject_token_type": "urn:ietf:params:oauth:token-type:jwt",
              "service_account_impersonation_url": "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/${GCP_SERVICE_ACCOUNT_EMAIL}:generateAccessToken",
              "token_url": "https://sts.googleapis.com/v1/token",
              "credential_source": { "file": "/tmp/circleci_oidc_token" }
            }
            JSON
            gcloud auth login --cred-file=/tmp/gcp_cred_config.json
            echo "WIF_LOGIN_OK"
      - run:
          name: "DIAG 1: Verify access token identity (is gcloud using OUR SA or a runner default?)"
          command: |
            source "$BASH_ENV"
            echo "=== gcloud auth list (which account is active?) ==="
            gcloud auth list 2>&1
            echo ""
            echo "=== gcloud config get-value account ==="
            gcloud config get-value account 2>&1
            echo ""
            echo "=== tokeninfo (what identity does the access token claim?) ==="
            ACCESS_TOKEN="$(gcloud auth print-access-token)"
            curl -s "https://oauth2.googleapis.com/tokeninfo?access_token=$ACCESS_TOKEN" \
              | jq '{email, azp, scope, expires_in}' 2>/dev/null || echo "(tokeninfo failed)"
            echo ""
            echo "=== Expected SA: $GCP_SERVICE_ACCOUNT_EMAIL ==="
      - run:
          name: "DIAG 2: Check Docker credential helpers (could override docker login)"
          command: |
            echo "=== ~/.docker/config.json ==="
            cat ~/.docker/config.json 2>/dev/null || echo "(no config.json)"
            echo ""
            echo "=== docker info: credentialsStore ==="
            docker info --format '{{json .Plugins}}' 2>/dev/null | jq . || echo "(no plugin info)"
      - run:
          name: "DIAG 3: Registry v2 API direct (bypasses Docker; real HTTP status codes)"
          command: |
            source "$BASH_ENV"
            ACCESS_TOKEN="$(gcloud auth print-access-token)"
            IMAGE_REPO="us-east1-docker.pkg.dev/influxdata-team-edge/ci-support/ci-cross-influxdb3"
            DIGEST="sha256:98b05538182a2e4eac5ce96150a1f5c552de48a7d3ea8d312d38e45f0dd42611"
            echo "=== List tags (can we read the repo at all?) ==="
            curl -s -w "\nHTTP_STATUS: %{http_code}\n" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "https://us-east1-docker.pkg.dev/v2/influxdata-team-edge/ci-support/ci-cross-influxdb3/tags/list" \
              | tail -5
            echo ""
            echo "=== Head manifest at specific digest (does this SHA exist?) ==="
            curl -sI -w "HTTP_STATUS: %{http_code}\n" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
              "https://us-east1-docker.pkg.dev/v2/influxdata-team-edge/ci-support/ci-cross-influxdb3/manifests/$DIGEST" \
              2>&1 | grep -iE 'HTTP|www-authenticate|docker-distribution|status'
            echo ""
            echo "=== testIamPermissions on the repo (does our SA have downloadArtifacts?) ==="
            curl -s -X POST \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              "https://artifactregistry.googleapis.com/v1/projects/influxdata-team-edge/locations/us-east1/repositories/ci-cross-influxdb3:testIamPermissions" \
              -d '{"permissions": ["artifactregistry.repositories.downloadArtifacts", "artifactregistry.repositories.get", "artifactregistry.repositories.list"]}' \
              | jq .
      - run:
          name: "DIAG 4: Try pull as ci-support-ro (pre-existing runner SA)"
          command: |
            source "$BASH_ENV"
            echo "=== Switching active gcloud account to ci-support-ro ==="
            gcloud config set account ci-support-ro@influxdata-team-edge.iam.gserviceaccount.com 2>&1
            echo ""
            echo "=== Confirm active account ==="
            gcloud config get-value account 2>&1
            echo ""
            echo "=== Docker pull via credHelper (which now uses ci-support-ro) ==="
            docker pull us-east1-docker.pkg.dev/influxdata-team-edge/ci-support/ci-cross-influxdb3@sha256:98b05538182a2e4eac5ce96150a1f5c552de48a7d3ea8d312d38e45f0dd42611 \
              && echo "PULL_OK_VIA_CI_SUPPORT_RO" \
              || echo "PULL_FAIL_VIA_CI_SUPPORT_RO"
            echo ""
            echo "=== Switching back to our SA ==="
            gcloud config set account "$GCP_SERVICE_ACCOUNT_EMAIL" 2>&1
      - run:
          name: "DIAG 5: Try pull as our SA (expected to fail until SRE grants)"
          command: |
            source "$BASH_ENV"
            gcloud config set account "$GCP_SERVICE_ACCOUNT_EMAIL" 2>&1
            docker pull us-east1-docker.pkg.dev/influxdata-team-edge/ci-support/ci-cross-influxdb3@sha256:98b05538182a2e4eac5ce96150a1f5c552de48a7d3ea8d312d38e45f0dd42611 \
              && echo "PULL_OK_VIA_OUR_SA" \
              || { echo "PULL_FAIL_VIA_OUR_SA"; exit 1; }

workflows:
  ci:
    jobs:
      - cargo-build
      - cargo-test
      - cargo-clippy
      - cargo-fmt
      - cargo-deny
      - cargo-doc
      - manifest-invariants
      - cargo-package-check

  auth-probe-v3:
    when:
      equal: [ "ci/release-auth-probe-v3", << pipeline.git.branch >> ]
    jobs:
      - release-auth-probe-v3:
          name: probe-our-sa
          context: [influxdb3-plugin-sdk-gcp]
      - release-auth-probe-v3:
          name: probe-shared-sa
          context: [gcp-wif-clustered]
